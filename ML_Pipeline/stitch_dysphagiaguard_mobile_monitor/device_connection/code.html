<h2 class="font-headline text-3xl font-bold text-on-surface">Connect to Device</h2>
</div>

<span class="h-2 w-2 rounded-full bg-primary/30"></span>
</div>
</div>

<div class="bg-surface-container-highest rounded-full w-8 h-8 flex items-center justify-center shrink-0 border border-outline-variant/15 text-primary font-bold font-headline">1</div>
<div>

<p class="font-body text-sm text-on-surface-variant mt-1 flex items-center gap-1">

                    </p>
</div>
</div>
<div class="flex gap-4 items-start group">
<div class="bg-surface-container-highest rounded-full w-8 h-8 flex items-center justify-center shrink-0 border border-outline-variant/15 text-primary font-bold font-headline">2</div>
<div>

</div>
</div>

</div>

</button>

</div>
