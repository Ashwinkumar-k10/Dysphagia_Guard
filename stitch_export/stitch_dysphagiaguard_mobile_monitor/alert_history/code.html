</div>

</div>

</div>
<div class="flex justify-end mt-2">
<button class="px-4 py-2 rounded-lg border border-outline-variant/30 text-on-error-container hover:bg-error/10 transition-colors font-label text-sm font-medium">Acknowledge</button>
</div>
</div>
