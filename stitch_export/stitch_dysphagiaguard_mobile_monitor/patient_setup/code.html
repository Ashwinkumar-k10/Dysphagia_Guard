<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Patient Setup - DysphagiaGuard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;800;900&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-fixed": "#001f27",
                      "on-tertiary": "#4d2600",
                      "primary-fixed": "#b3ebff",
                      "inverse-primary": "#00677d",
                      "secondary-fixed-dim": "#4ae183",
                      "on-error-container": "#ffdad6",
                      "secondary-container": "#06bb63",
                      "on-primary-container": "#00414f",
                      "error": "#ffb4ab",
                      "inverse-surface": "#d6e4f9",
                      "surface-variant": "#283646",
                      "tertiary-fixed-dim": "#ffb77d",
                      "on-error": "#690005",
                      "primary-container": "#00b4d8",
                      "primary-fixed-dim": "#4cd6fb",
                      "secondary": "#4ae183",
                      "surface-container-highest": "#283646",
                      "secondary-fixed": "#6bfe9c",
                      "on-secondary-container": "#00431f",
                      "on-background": "#d6e4f9",
                      "on-secondary": "#003919",
                      "background": "#061423",
                      "tertiary": "#ffb77d",
                      "on-secondary-fixed-variant": "#005228",
                      "tertiary-container": "#eb8f3b",
                      "inverse-on-surface": "#243141",
                      "surface-dim": "#061423",
                      "on-surface": "#d6e4f9",
                      "surface-tint": "#4cd6fb",
                      "surface-container-high": "#1e2b3b",
                      "on-tertiary-container": "#5d2f00",
                      "error-container": "#93000a",
                      "tertiary-fixed": "#ffdcc3",
                      "surface-container-lowest": "#020f1e",
                      "on-surface-variant": "#bcc9ce",
                      "on-secondary-fixed": "#00210c",
                      "primary": "#4cd6fb",
                      "surface-bright": "#2d3a4a",
                      "on-primary-fixed-variant": "#004e5f",
                      "on-primary": "#003642",
                      "on-tertiary-fixed": "#2f1500",
                      "surface-container-low": "#0f1c2c",
                      "surface": "#061423",
                      "outline": "#869398",
                      "outline-variant": "#3d494d",
                      "surface-container": "#132030",
                      "on-tertiary-fixed-variant": "#6e3900"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": [
                              "Public Sans"
                      ],
                      "body": [
                              "Inter"
                      ],
                      "label": [
                              "Inter"
                      ]
              }
      },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col pt-16 pb-24">
<!-- TopAppBar -->
<header class="bg-slate-950/80 backdrop-blur-[20px] fixed top-0 w-full z-50 shadow-[0px_32px_48px_rgba(76,214,251,0.08)] flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="text-cyan-400 hover:bg-cyan-400/10 transition-colors active:scale-95 duration-200 p-2 rounded-full -ml-2">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-['Public_Sans'] font-bold tracking-tight text-sm uppercase text-cyan-400">DysphagiaGuard</h1>
</div>
<div>
<button class="text-cyan-400 hover:bg-cyan-400/10 transition-colors active:scale-95 duration-200 font-['Public_Sans'] font-bold tracking-tight text-sm uppercase px-3 py-1 rounded-full">
                00:42
            </button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col p-4 md:p-6 lg:p-8 max-w-2xl mx-auto w-full gap-6">
<div class="mb-2 mt-4">
<h2 class="font-headline text-3xl font-bold text-on-surface tracking-tight">Patient Setup</h2>
<p class="font-body text-on-surface-variant text-sm mt-1">Configure monitoring parameters for the current session.</p>
</div>
<!-- Form Section -->
<section class="bg-surface-container-low rounded-xl p-1 pb-6">
<div class="bg-surface-container-high rounded-lg p-5 flex flex-col gap-5">
<!-- Field: Patient Name -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1" for="patientName">Patient Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">person</span>
<input class="w-full bg-surface-container-highest text-on-surface border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-md pl-10 pr-4 py-3 font-body text-sm placeholder:text-on-surface-variant/50 transition-colors" id="patientName" placeholder="Enter full name" type="text"/>
</div>
</div>
<!-- Field: Age -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1" for="patientAge">Age</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">cake</span>
<input class="w-full bg-surface-container-highest text-on-surface border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-md pl-10 pr-4 py-3 font-body text-sm placeholder:text-on-surface-variant/50 transition-colors" id="patientAge" placeholder="Years" type="number"/>
</div>
</div>
<!-- Field: Condition -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1" for="condition">Primary Condition</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">medical_information</span>
<select class="w-full bg-surface-container-highest text-on-surface border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-md pl-10 pr-10 py-3 font-body text-sm appearance-none transition-colors" id="condition">
<option class="text-on-surface-variant/50" disabled="" selected="" value="">Select condition</option>
<option value="post-stroke">Post-Stroke</option>
<option value="parkinsons">Parkinson's</option>
<option value="als">ALS</option>
<option value="elderly">Elderly (General)</option>
<option value="other">Other</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Field: Caregiver Name -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1" for="caregiverName">Caregiver Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">badge</span>
<input class="w-full bg-surface-container-highest text-on-surface border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-md pl-10 pr-4 py-3 font-body text-sm placeholder:text-on-surface-variant/50 transition-colors" id="caregiverName" placeholder="Enter caregiver name" type="text"/>
</div>
</div>
<!-- Field: Phone Number -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1" for="phoneNumber">Phone Number <span class="text-[10px] text-on-surface-variant/70 normal-case tracking-normal ml-1">(For PDF Report)</span></label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">call</span>
<input class="w-full bg-surface-container-highest text-on-surface border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-md pl-10 pr-4 py-3 font-body text-sm placeholder:text-on-surface-variant/50 transition-colors" id="phoneNumber" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
</div>
</section>
<!-- Toggles Section -->
<section class="bg-surface-container-low rounded-xl p-1 mb-8">
<div class="bg-surface-container-high rounded-lg flex flex-col divide-y divide-surface-container-highest/50">
<!-- Toggle: Silent Night Mode -->
<div class="flex items-start justify-between p-4 gap-4">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary text-lg">bedtime</span>
<span class="font-headline font-semibold text-sm text-on-surface">Silent Night Mode</span>
</div>
<p class="font-body text-xs text-on-surface-variant">Disables buzzer. Device vibrates silently. Use for overnight monitoring.</p>
</div>
<!-- Custom Toggle Switch -->
<label class="relative inline-flex items-center cursor-pointer flex-shrink-0 mt-1">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-on-surface after:border-outline after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Toggle: Auto-generate PDF -->
<div class="flex items-center justify-between p-4 gap-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-lg">picture_as_pdf</span>
<span class="font-headline font-semibold text-sm text-on-surface">Auto-generate PDF after session</span>
</div>
<!-- Custom Toggle Switch -->
<label class="relative inline-flex items-center cursor-pointer flex-shrink-0">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-on-surface after:border-outline after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
</section>
</main>
<!-- Bottom Action Area (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md p-4 border-t border-outline-variant/10 z-40">
<div class="max-w-2xl mx-auto">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-base py-4 rounded-lg flex items-center justify-center gap-2 shadow-[0_8px_16px_rgba(76,214,251,0.15)] active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined">play_arrow</span>
                Save &amp; Start Monitoring
            </button>
</div>
</div>
</body></html>
